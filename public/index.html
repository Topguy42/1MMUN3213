  <script>
    /* Wait until React has rendered (Babel transpiles async), then inject canvas1
       as first child of #root so it sits above the CSS background pseudo-elements. */
    (function () {
      function startParticles(root) {
        const c = document.createElement('canvas');
        c.setAttribute('aria-hidden', 'true');
        c.style.cssText = 'position:fixed;inset:0;width:100%;height:100%;pointer-events:none;';
        root.prepend(c);

        const ctx = c.getContext('2d');
        let W, H, pts;

        function resize() {
          W = c.width  = window.innerWidth;
          H = c.height = window.innerHeight;
          pts = Array.from({ length: Math.min(60, Math.floor(W * H / 14000)) }, () => ({
            x:  Math.random() * W,
            y:  Math.random() * H,
            r:  Math.random() * 1.3 + 0.3,
            vx: (Math.random() - 0.5) * 0.32,
            vy: (Math.random() - 0.5) * 0.32,
            a:  Math.random() * 0.28 + 0.06
          }));
        }

        function frame() {
          ctx.clearRect(0, 0, W, H);
          if (!document.documentElement.hasAttribute('data-reduce-motion')) {
            for (let i = 0; i < pts.length; i++) {
              const p = pts[i];
              p.x += p.vx; p.y += p.vy;
              if (p.x < 0 || p.x > W) p.vx *= -1;
              if (p.y < 0 || p.y > H) p.vy *= -1;
              for (let j = i + 1; j < pts.length; j++) {
                const q = pts[j];
                const d = Math.hypot(p.x - q.x, p.y - q.y);
                if (d < 105) {
                  ctx.strokeStyle = `rgba(255,255,255,${0.02 * (1 - d / 105)})`;
                  ctx.lineWidth = 0.5;
                  ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(q.x, q.y); ctx.stroke();
                }
              }
              ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
              ctx.fillStyle = `rgba(255,255,255,${p.a * 0.5})`; ctx.fill();
            }
          }
          requestAnimationFrame(frame);
        }

        resize();
        frame();
        window.addEventListener('resize', resize);
      }

      /* Poll each frame until React has mounted its header, then inject once. */
      function tryInject() {
        const root = document.getElementById('root');
        if (root && root.querySelector('header')) {
          startParticles(root);
        } else {
          requestAnimationFrame(tryInject);
        }
      }
      requestAnimationFrame(tryInject);
    })();
  </script>
